<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" fill="none">
  <defs>
    <linearGradient id="kaikaSage" gradientUnits="userSpaceOnUse" x1="70" y1="120" x2="70" y2="22">
      <stop offset="0%" stop-color="#3F6249"/>
      <stop offset="50%" stop-color="#7FA888"/>
      <stop offset="100%" stop-color="#CDE0C0"/>
    </linearGradient>
    <linearGradient id="kaikaSageBud" gradientUnits="userSpaceOnUse" x1="0" y1="35" x2="0" y2="25">
      <stop offset="0%" stop-color="#9CC5A2"/>
      <stop offset="100%" stop-color="#D9EACA"/>
    </linearGradient>
  </defs>

  <!-- Symbol -->
  <g transform="translate(70, 115)">
    <!-- Left petal -->
    <g transform="rotate(-30)">
      <path d="M 0 0 C -6.5 -14, -8.5 -42, 0 -58 C 8.5 -42, 6.5 -14, 0 0 Z" fill="url(#kaikaSage)" opacity="0.94"/>
    </g>
    <!-- Right petal -->
    <g transform="rotate(30)">
      <path d="M 0 0 C -6.5 -14, -8.5 -42, 0 -58 C 8.5 -42, 6.5 -14, 0 0 Z" fill="url(#kaikaSage)" opacity="0.94"/>
    </g>
    <!-- Center petal (tallest) -->
    <path d="M 0 0 C -9.5 -24, -10.5 -62, 0 -82 C 10.5 -62, 9.5 -24, 0 0 Z" fill="url(#kaikaSage)"/>
    <!-- Small emerging bud -->
    <circle cx="32" cy="-68" r="4" fill="url(#kaikaSageBud)"/>
  </g>

  <!-- Wordmark: Kaika -->
  <g transform="translate(168, 92)" fill="#EDE6D8">
    <text font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="62" font-weight="500" letter-spacing="3">Kaika</text>
  </g>
</svg>
